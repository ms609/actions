name: Check for memory errors
description: use valgrind to check for memory usage errors
inputs:
    test:
      description: Which aspect of the package to test. Select "tests", "examples", "vignettes" or "all".
      required: false
      default: all
    extra-repositories:
      description: Extra repositories, passed to r-lib/actions/setup-r
      required: false
    submodules:
      description: Whether to checkout submodules. Passed to actions/checkout.
      required: false
      default: 'false'

runs:
  using: 'composite'
  steps:
    - name: Set environment variables
      run: |
        # Suppress ASan link-order warnings when packages compiled with
        # AddressSanitizer are loaded under valgrind without ASan preloaded.
        echo "ASAN_OPTIONS=verify_asan_link_order=0" >> "$GITHUB_ENV"
      shell: bash

    - name: Checkout git repo
      uses: actions/checkout@v5
      with:
        submodules: ${{ inputs.submodules }}

    - name: Read Additional_repositories from DESCRIPTION
      id: desc-repos
      run: |
        repos=$(grep "^Additional_repositories:" DESCRIPTION 2>/dev/null \
          | sed 's/^Additional_repositories:[[:space:]]*//' || true)
        # Combine with any caller-supplied extra-repositories
        all_repos=$(printf '%s\n' "$repos" "${{ inputs.extra-repositories }}" \
          | grep -v '^$' | tr '\n' ' ' || true)
        echo "repos=$all_repos" >> "$GITHUB_OUTPUT"
      shell: bash

    - name: Set up R
      uses: r-lib/actions/setup-r@v2
      with:
        r-version: release # CRAN uses devel, but takes ages to load deps.
        extra-repositories: ${{ steps.desc-repos.outputs.repos }}

    - name: Install apt packages
      run: |
        sudo apt-get install valgrind
      shell: bash
    
    - name: Download Valgrind suppression file
      run: |
        curl -o suppressions.supp https://raw.githubusercontent.com/ms609/actions/refs/heads/main/memcheck/suppressions.supp
      shell: bash
      
    - name: Configure compiler flags for debugging
      run: |
        if [ -d "src" ]; then
          echo "PKG_CFLAGS = -g -O0" > src/Makevars
          echo "PKG_CXXFLAGS = -g -O0" >> src/Makevars
        fi
      shell: bash
      
    - name: Install package dependencies
      uses: r-lib/actions/setup-r-dependencies@v2
      with:
        dependencies: ${{ (inputs.test == 'vignettes' || inputs.test == 'all') && '"soft"' || '"hard"' }}
        needs: memcheck

    - name: Install package
      run: |
        pak::local_install(dependencies = FALSE)
      shell: Rscript {0}

    - name: valgrind - memcheck tests
      if: ${{ inputs.test == 'tests' || inputs.test == 'all' }}
      run: |
        R -d "valgrind --tool=memcheck \
        --leak-check=full \
        --track-origins=yes \
        --errors-for-leak-kinds=definite \
        --suppressions=suppressions.supp \
        --gen-suppressions=all \
        --error-exitcode=1" \
        --vanilla \
        -e "testthat::test_local()"
      shell: bash

    - name: Install devtools for run_examples
      if: ${{ inputs.test == 'examples' || inputs.test == 'all' }}
      run: Rscript -e "pak::pkg_install('devtools')"
      shell: bash

    - name: valgrind - memcheck examples
      if: ${{ inputs.test == 'examples' || inputs.test == 'all' }}
      run: |
        R -d "valgrind --tool=memcheck \
        --leak-check=full \
        --track-origins=yes \
        --errors-for-leak-kinds=definite \
        --suppressions=suppressions.supp \
        --gen-suppressions=all \
        --error-exitcode=1" \
        --vanilla \
        -e "devtools::run_examples()"
      shell: bash

    - name: Set up pandoc
      if: ${{ inputs.test == 'vignettes' || inputs.test == 'all' }}
      uses: r-lib/actions/setup-pandoc@v2
      
    - name: valgrind - memcheck vignettes
      if: ${{ inputs.test == 'vignettes' || inputs.test == 'all' }}
      run: |
        R -d "valgrind --tool=memcheck \
        --leak-check=full \
        --errors-for-leak-kinds=definite \
        --suppressions=suppressions.supp \
        --gen-suppressions=all \
        --error-exitcode=1" \
        --vanilla \
        -e "tools::buildVignettes(dir = '.')"
      shell: bash

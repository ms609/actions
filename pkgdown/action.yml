name: Build package documentation
description: use pkgdown to build and deploy package documentation
inputs:
  extra-repositories:
    description: >
      Extra repositories from which to download required packages; passed to
      the setup-r step. The package's own `Additional_repositories` (from
      DESCRIPTION) is merged in automatically, so a drat declared there need
      not be repeated here.
    required: false
    default: ''
  submodules:
    description: Also download package submodules
    required: false
    default: 'false'
  run-only:
    description: Skip the setup steps and run directly, assuming that setup was run
    required: false
    default: false
  user-email:
    description: E-mail address to which commit should be attributed
    required: false
    default: 'actions@github.com'
  user-name:
    description: User name to which commit should be attributed
    required: false
    default: 'GitHub Actions'
  deploy:
    description: Should the site be deployed once built? (ignored if shinylive-app is set)
    required: false
    default: 'true'
  shinylive-app:
    description: Path to a folder containing `app.R`, a Shiny app to be converted via Shinylive
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - uses: actions/checkout@v6    
      with:
        submodules: ${{ inputs.submodules }}

    - uses: r-lib/actions/setup-pandoc@v2

    # setup-r seeds `repos` only from its extra-repositories input, and pak's
    # lockfile resolution ignores DESCRIPTION's Additional_repositories. So a
    # drat declared there (the base-R `install.packages` idiom) is invisible
    # during dependency resolution and packages only on it (e.g. dev TreeTools
    # / TreeSearch) fail with "Can't install dependency". Surface it here and
    # merge with any explicitly-provided repositories.
    - name: Merge Additional_repositories into extra repositories
      id: extra-repos
      shell: bash
      run: |
        extract_field() {
          # Print the value of a single DCF field, including indented
          # continuation lines, with the field name stripped.
          awk -v field="$1" '
            $0 ~ "^" field ":" { grab = 1; sub("^" field ":[ \t]*", ""); print; next }
            grab && /^[ \t]/   { print; next }
            grab               { grab = 0 }
          ' DESCRIPTION
        }
        merged=$(
          {
            printf '%s\n' "${{ inputs.extra-repositories }}"
            [ -f DESCRIPTION ] && extract_field "Additional_repositories"
          } \
            | tr ',' '\n' \
            | sed 's/^[[:space:]]*//; s/[[:space:]]*$//' \
            | grep -E '^https?://' \
            | awk '!seen[$0]++'
        ) || true
        {
          echo 'repositories<<__EOF__'
          echo "$merged"
          echo '__EOF__'
        } >> "$GITHUB_OUTPUT"

    - uses: r-lib/actions/setup-r@v2
      with:
        use-public-rspm: true
        extra-repositories: ${{ steps.extra-repos.outputs.repositories }}

    - name: Install Mac OS dependencies
      if: runner.os == 'MacOS'
      run: |
        brew install libgit2
      shell: bash
      
    - name: Install libcurl
      if: runner.os == 'Linux'
      run: |
        sudo apt-get install libcurl4-openssl-dev
      shell: bash

    - name: Git credentials
      run: |
        git config --local user.email "${{ inputs.user-email }}"
        git config --local user.name "${{ inputs.user-name }}"
      shell: bash

    - uses: r-lib/actions/setup-r-dependencies@v2
      with:
        cache-version: 4826426 # Distinct number to avoid conflict with other workflows
        extra-packages: local::., any::pkgdown
        needs: website


    - name: Build and optionally deploy
      shell: Rscript {0}
      run: |
        is_shinylive <- "${{ inputs.shinylive-app }}" != ""
        should_deploy <- "${{ inputs.deploy }}" == "true"
        
        if (is_shinylive) {
          pkgdown::build_site(install = FALSE, new_process = FALSE)
          
          pkg_name <- read.dcf("DESCRIPTION")[, "Package"]
          source_path <- "${{ inputs.shinylive-app }}"
          final_app_dir <- if (dir.exists(source_path)) source_path else 
            system.file(basename(source_path), package = pkg_name)
          
          if (dir.exists(final_app_dir) && file.exists(file.path(final_app_dir, "app.R"))) {
          } else {
            stop(paste("Could not find app.R in", installed_path, ". Do you need to fetch submodules?"))
          }
          
          if (!requireNamespace("shinylive", quietly = TRUE)) {
            install.packages("shinylive")
          }
          
          shinylive::export(
            appdir = final_app_dir,
            destdir = "docs/app"
          )
          file.create("docs/.nojekyll")
         
        } else {
          # build_site_github_pages (not build_site) writes the .nojekyll that
          # disables Jekyll on branch-deployed Pages; without it, GitHub runs
          # Jekyll over the HTML and chokes on tokens like BibTeX's {{Foo}.
          pkgdown::build_site_github_pages(install = FALSE, new_process = FALSE)
        }
        
        if (length(warnings()) > 0) {
          print(warnings())
        }

    - name: Deploy to GitHub Pages
      if: ${{ inputs.deploy == 'true' }}
      uses: JamesIves/github-pages-deploy-action@v4
      with:
        folder: docs
        branch: gh-pages
        clean: false
